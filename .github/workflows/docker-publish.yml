name: Docker Publish

# Publica imágenes en GHCR (GitHub Container Registry)
# Usa GITHUB_TOKEN automáticamente — sin secretos extra
# Imágenes producidas:
#   ghcr.io/brunoayalac/abogacia/legalpro-frontend:latest
#   ghcr.io/brunoayalac/abogacia/legalpro-node:latest
#   ghcr.io/brunoayalac/abogacia/legalpro-dotnet:latest

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:   # Permite lanzar manualmente desde GitHub UI

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: brunoayalac

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. FRONTEND SPA (nginx:alpine)
  # ──────────────────────────────────────────────────────────────
  docker-frontend:
    name: Docker — Frontend SPA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta — frontend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/legalpro-frontend
          tags: |
            type=raw,value=latest

      - name: Build & push — Frontend SPA
        uses: docker/build-push-action@v6
        with:
          context: ./legalpro-app
          file: ./legalpro-app/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_NODE_API_URL=${{ secrets.VITE_NODE_API_URL }}
            VITE_DOTNET_API_URL=${{ secrets.VITE_DOTNET_API_URL }}
            VITE_APK_URL=${{ secrets.VITE_APK_URL }}
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ──────────────────────────────────────────────────────────────
  # 2. BACKEND NODE API (node:20-alpine)
  # ──────────────────────────────────────────────────────────────
  docker-node-api:
    name: Docker — Node API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta — node-api
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/legalpro-node
          tags: |
            type=raw,value=latest

      - name: Build & push — Node API
        uses: docker/build-push-action@v6
        with:
          context: ./legalpro-app
          file: ./legalpro-app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ──────────────────────────────────────────────────────────────
  # 3. BACKEND .NET API (aspnet:9.0-alpine)
  # ──────────────────────────────────────────────────────────────
  docker-dotnet-api:
    name: Docker — .NET API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta — dotnet-api
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/legalpro-dotnet
          tags: |
            type=raw,value=latest

      - name: Build & push — .NET API
        uses: docker/build-push-action@v6
        with:
          context: ./LegalProBackend_Net
          file: ./LegalProBackend_Net/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
