name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Escaneo semanal automático, lunes a las 03:00 UTC
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write # Para subir resultados de Trivy a GitHub Security

jobs:
  # ─── Job 1: Secrets Leak Detection (Gitleaks) ─────────────────────────────
  secrets-scan:
    name: Secrets Leak Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historial completo para detectar secretos en commits anteriores

      - name: Ejecutar Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 2: npm audit (Node backend) ──────────────────────────────────────
  node-audit:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legalpro-app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: legalpro-app/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: npm audit (HIGH+CRITICAL)
        run: npm audit --audit-level=high

  # ─── Job 3: .NET vulnerability scan ───────────────────────────────────────
  dotnet-audit:
    name: .NET Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LegalProBackend_Net
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar paquetes
        run: dotnet restore LegalPro.sln

      - name: Escanear vulnerabilidades NuGet
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln_report.txt ; grep -i 'has the following vulnerable packages' vuln_report.txt && exit 1 || exit 0

  # ─── Job 4: Trivy scan imagen .NET ────────────────────────────────────────
  trivy-dotnet:
    name: Trivy Scan (.NET Docker)
    runs-on: ubuntu-latest
    needs: [node-audit, dotnet-audit]
    steps:
      - uses: actions/checkout@v4

      - name: Build imagen .NET
        run: docker build -t legalpro-dotnet:${{ github.sha }} ./LegalProBackend_Net

      - name: Trivy scan imagen .NET
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: legalpro-dotnet:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-dotnet.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Subir resultados a GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-dotnet.sarif'
          category: 'trivy-dotnet'

  # ─── Job 5: Trivy scan imagen Node ────────────────────────────────────────
  trivy-node:
    name: Trivy Scan (Node Docker)
    runs-on: ubuntu-latest
    needs: [node-audit, dotnet-audit]
    steps:
      - uses: actions/checkout@v4

      - name: Build imagen Node
        run: docker build -t legalpro-node:${{ github.sha }} ./legalpro-app

      - name: Trivy scan imagen Node
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: legalpro-node:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-node.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Subir resultados a GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-node.sarif'
          category: 'trivy-node'

  # ─── Job 6: CodeQL SAST (.NET) ────────────────────────────────────────────
  codeql-dotnet:
    name: CodeQL SAST (.NET)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build .NET para CodeQL
        run: |
          cd LegalProBackend_Net
          dotnet restore LegalPro.sln
          dotnet build LegalPro.sln --no-restore --configuration Release

      - name: Ejecutar análisis CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:csharp'
