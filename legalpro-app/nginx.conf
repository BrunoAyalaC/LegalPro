server {
    listen 3000;
    root /app/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets estáticos (JS, CSS, imágenes) — cache agresivo
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Landing estática: /landing/ → dist/landing/index.html
    # También sirve scroll-engine.js y assets de la landing
    location /landing/ {
        try_files $uri $uri/ /landing/index.html;
        add_header Cache-Control "no-cache";
    }

    # SPA React — todas las demás rutas → dist/index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
